# Brand voice constraints for the Message Composer (introduced in a later class).
# The Evidence Reviewer scores messages against these rules.

tone:
  - peer-to-peer
  - informed
  - concise
  - consultative

avoid:
  - generic compliments
  - exaggerated claims
  - fake familiarity
  - aggressive selling
  - buzzword-heavy language

first_message:
  pitch_allowed: false
  maximum_words: 90
