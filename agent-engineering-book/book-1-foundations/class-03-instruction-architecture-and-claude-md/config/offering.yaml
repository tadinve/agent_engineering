# What we sell, and the boundaries agents must respect when describing it.
# Message Composer and Evidence Reviewer both read this to keep claims honest.

name: ApexNeural Enterprise GenAI Advisory and Transformation

what_we_sell: >
  Advisory and hands-on delivery that takes an enterprise from scattered GenAI
  pilots to a production-grade, governed AI platform integrated with existing
  data and operational systems.

who_benefits:
  - CIOs and CTOs accountable for enterprise AI strategy
  - VPs of Digital Transformation running multi-year modernization programs
  - Heads of Data and AI building platform and governance capability
  - Plant Operations leaders whose teams depend on reliable automation

problems_addressed:
  - fragmented, plant-level or team-level AI pilots that never reach production
  - unclear ROI and governance for GenAI initiatives
  - legacy data platforms that block enterprise-wide AI rollout
  - talent gaps in applied AI engineering

proof_points:
  # Summary only. The enforceable source of truth — source, disclosure
  # status, allowed contexts, review date — is proof-points.yaml. Any agent
  # citing a proof point must resolve it against that registry, not this
  # list; this list exists for humans skimming this file, not for agents.
  see: proof-points.yaml
  summary:
    - PP-001: delivered production AI systems for industrial and manufacturing enterprises
    - PP-002: experience integrating GenAI with existing ERP, MES and data platforms
    - PP-003: advisory led by practitioners who have shipped agentic systems, not slideware

exclusions:
  - we do not build or sell foundation models
  - we do not offer generic staff-augmentation without an architecture point of view
  - we do not guarantee specific cost savings or headcount reduction figures

typical_engagement_model:
  - 2-4 week discovery and architecture assessment
  - pilot delivery on one high-value workflow
  - platform buildout and team enablement

plausible_outcomes:
  - a working, governed path from pilot to production for one priority workflow
  - a reusable architecture pattern the client's own team can extend
  - measurable reduction in time-to-production for future AI initiatives

claims_that_may_not_be_made:
  - specific percentage ROI or cost-savings figures not backed by a client reference
  - guaranteed timelines for enterprise-wide rollout
  - claims of an existing relationship with the target company unless verified
  - any implication that we have already spoken with the recipient
