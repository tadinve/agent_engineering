# Beginner evaluation dataset (Ch. 10.5): a small golden case combining
# expected company facts, known signals, prohibited claims, and
# message-quality examples. evals/run_eval.py runs deterministic checks
# against this. The qualitative half of evaluation — is the research
# actually good, not merely structurally valid — lives in GRADING.md and
# ../../GRADING-RUBRIC-TEMPLATE.md, not here.
#
# Reuses the Rockwell Automation fixtures already established in Ch. 6-7
# rather than inventing new test data.

cases:
  - company: Rockwell Automation

    expected_facts:
      - industrial automation
      - manufacturers

    known_signals:
      - category: product
        keyword: AI-enabled

    prohibited_claims:
      - guarantee
      - already spoken with
      - percent roi
      - cost savings

    message_quality_examples:
      - text: >
          Noticed Rockwell Automation — is emphasizing AI-enabled offerings
          across its automation portfolio. Experience integrating GenAI
          with existing ERP, MES, and data platforms. Curious how your
          team is thinking about this — worth a short conversation?
        expected_compliant: true

      - text: >
          Hope this email finds you well! We guarantee 30% cost savings
          and have already spoken with your leadership team about this
          amazing opportunity.
        expected_compliant: false
