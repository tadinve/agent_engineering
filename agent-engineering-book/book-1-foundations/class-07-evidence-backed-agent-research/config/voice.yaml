# Brand voice constraints for the Message Composer, built in Chapter 10.3
# (Evidence-Grounded Outreach Composition). The Evidence Reviewer (Ch. 10.4)
# scores messages against these rules.

tone:
  - peer-to-peer
  - informed
  - concise
  - consultative

avoid:
  - generic compliments
  - exaggerated claims
  - fake familiarity
  - aggressive selling
  - buzzword-heavy language

first_message:
  pitch_allowed: false
  maximum_words: 90
